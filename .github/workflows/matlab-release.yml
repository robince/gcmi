name: MATLAB Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  matlab-macos-r2024b:
    name: MATLAB macOS R2024b
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2024b

      - name: Build, smoke-test, and package native MEX runtime
        uses: matlab-actions/run-build@v3
        with:
          tasks: test package

      - name: Upload packaged runtime artifact
        uses: actions/upload-artifact@v6
        with:
          name: gcmi-cpp-mex-R2024b-macos
          path: build/matlab/packages/gcmi_cpp_mex_2024b_*.zip
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(build/matlab/packages/gcmi_cpp_mex_2024b_*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found for tag ${TAG}" >&2
            exit 1
          fi

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --title "${TAG}" --notes "" || gh release view "${TAG}" >/dev/null
          fi

          gh release upload "${TAG}" "${files[@]}" --clobber

  matlab-linux-r2024b:
    name: MATLAB Linux x86_64 R2024b
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2024b

      - name: Build, smoke-test, and package native MEX runtime
        uses: matlab-actions/run-build@v3
        with:
          tasks: test package

      - name: Upload packaged runtime artifact
        uses: actions/upload-artifact@v6
        with:
          name: gcmi-cpp-mex-R2024b-linux-x86_64
          path: build/matlab/packages/gcmi_cpp_mex_2024b_*.zip
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(build/matlab/packages/gcmi_cpp_mex_2024b_*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found for tag ${TAG}" >&2
            exit 1
          fi

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --title "${TAG}" --notes "" || gh release view "${TAG}" >/dev/null
          fi

          gh release upload "${TAG}" "${files[@]}" --clobber
