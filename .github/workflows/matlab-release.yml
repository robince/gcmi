name: MATLAB Release

on:
  push:
    branches:
      - matlab-mex-cpp
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  matlab-macos-r2024b:
    name: MATLAB macOS R2024b
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2024b

      - name: Build, smoke-test, and package native MEX runtime
        uses: matlab-actions/run-build@v2
        with:
          tasks: test package

      - name: Upload packaged runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcmi-cpp-mex-R2024b-macos
          path: build/matlab/packages/gcmi_cpp_mex_R2024b_*.zip
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/matlab/packages/gcmi_cpp_mex_R2024b_*.zip

  matlab-linux-r2024b:
    name: MATLAB Linux x86_64 R2024b
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2024b

      - name: Build, smoke-test, and package native MEX runtime
        uses: matlab-actions/run-build@v2
        with:
          tasks: test package

      - name: Upload packaged runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcmi-cpp-mex-R2024b-linux-x86_64
          path: build/matlab/packages/gcmi_cpp_mex_R2024b_*.zip
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/matlab/packages/gcmi_cpp_mex_R2024b_*.zip
