[build-system]
requires = []
build-backend = "build_backend"
backend-path = ["."]

[project]
name = "gcmi"
version = "0.4.0"
description = "Gaussian-copula mutual information estimators"
requires-python = ">=3.10"
dependencies = [
    "matplotlib>=3.10.8",
    "numba>=0.64.0",
    "numpy>=1.23",
    "pyperf>=2.10.0",
    "scipy>=1.15.3",
]

[project.optional-dependencies]
test = ["pytest>=8"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
  "error::DeprecationWarning",
  "error::PendingDeprecationWarning",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
